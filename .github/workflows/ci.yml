name: CI

# Runs on every push and PR. Three jobs, deliberately ordered by how fast they
# fail: unit tests first, then the full pipeline against a real Postgres, then
# the dependency and image scans.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app-tests:
    name: App tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -r app/requirements.txt pytest
      - name: Test
        run: python -m pytest app/tests -q

  pipeline:
    name: Pipeline (generate, load, dbt build)
    runs-on: ubuntu-latest
    # why: this is the job worth having. It proves the whole chain against the
    # same engine production uses -- never SQLite, never a mock. If the generator,
    # the loader and the models disagree, this is where it surfaces.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: andvari_admin
          POSTGRES_PASSWORD: ci_only_not_a_secret
          POSTGRES_DB: andvari
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U andvari_admin -d andvari"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      PORTFOLIO_DB_HOST: localhost
      PORTFOLIO_DB_PORT: "5432"
      PORTFOLIO_DB_USER: andvari_admin
      PORTFOLIO_DB_PASSWORD: ci_only_not_a_secret
      PORTFOLIO_DB_NAME: andvari
      READER_DB_PASSWORD: ci_only_reader_not_a_secret
      DBT_HOST: localhost
      DBT_PORT: "5432"
      DBT_USER: andvari_admin
      DBT_PASSWORD: ci_only_not_a_secret
      DBT_DBNAME: andvari
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install data dependencies
        run: pip install -r data/requirements.txt pytest
      - name: Generator property tests
        # statistical assertions on the distributions (seed-stable): the
        # README's "not random noise" claim, enforced before anything loads.
        run: python -m pytest data/tests -q
      - name: Generate and load
        working-directory: data
        # a reduced volume: CI is proving the chain works, not benchmarking it.
        # the distributions are asserted by the generator's own spot-check output.
        run: |
          python generate_data.py --rows 20000 --users 500
          python load_data.py \
            --host "$PORTFOLIO_DB_HOST" --port "$PORTFOLIO_DB_PORT" \
            --user "$PORTFOLIO_DB_USER" --password "$PORTFOLIO_DB_PASSWORD" \
            --dbname "$PORTFOLIO_DB_NAME" \
            --reader-password "$READER_DB_PASSWORD"
      - name: Install dbt
        run: pip install -r dbt/requirements.txt
      - name: dbt build
        working-directory: dbt
        # `build`, not `run`: build executes the models AND the tests. Using `run`
        # is how a sibling project shipped two tests that had never passed.
        run: |
          cp profiles.docker.yml profiles.yml
          dbt deps --profiles-dir .
          dbt build --profiles-dir .
      - name: SQL lint
        working-directory: dbt
        # style gate for [STD-13]: lowercase keywords, leading commas, explicit
        # columns. The dbt templater compiles jinja before linting.
        run: |
          pip install "sqlfluff==3.4.2" "sqlfluff-templater-dbt==3.4.2"
          sqlfluff lint models
      - name: dbt docs
        working-directory: dbt
        # lineage is institutional memory [STD-04]; the artifact is the
        # browsable single-file docs site for every CI run.
        run: dbt docs generate --profiles-dir . --static
      - name: Upload dbt docs
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt/target/static_index.html

  security:
    name: Dependency and image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans the full history, not just the tip
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: SAST (bandit)
        # blocking at medium+ severity; the tree is clean today, so any new
        # finding is a regression, not noise.
        run: |
          pip install bandit
          bandit -r app data -x ./app/tests,./data/tests,./data/generated -ll
      - name: pip-audit
        # blocking on purpose. The monorepo ran these with `|| true`, which meant a
        # green tick never meant "no known vulnerabilities". If a finding needs to
        # be accepted, accept it explicitly with --ignore-vuln and a comment saying
        # why, so the exception is visible in the diff rather than in the exit code.
        run: |
          pip install pip-audit
          # Ignores are today's accepted findings, each listed in SECURITY.md with a
          # reason and an upgrade target. Anything NEW fails this job.
          # app and data carry no accepted findings: they must be clean.
          pip-audit -r app/requirements.txt
          pip-audit -r data/requirements.txt
          # dbt is the exception, and it is blocked upstream rather than neglected:
          # dbt-core 1.9.4 constrains protobuf<6.0, which pins dbt-common and
          # deepdiff to versions carrying these. Clearing them means moving dbt-core.
          # Listed with reasons in SECURITY.md.
          pip-audit -r dbt/requirements.txt --ignore-vuln PYSEC-2026-2440 --ignore-vuln PYSEC-2026-327 --ignore-vuln PYSEC-2026-2445
      - name: Build images
        run: |
          docker build -t andvari-app:ci app
          docker build -t andvari-data:ci data
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: andvari-app:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

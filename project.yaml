title: LLM Telemetry
summary: Synthetic Claude-style API telemetry through a full analytics pipeline -- generation, dimensional modelling, measured schema comparison, forecasting.
repo_url: https://github.com/lukeudell/andvari
# flip published once the repo is pushed and the link resolves
published: false
tags: [dbt, postgres, python, streamlit]

sections:
  - slug: overview
    title: Overview
    published: true
    body: |
      A full-stack data engineering demonstration: synthetic LLM API telemetry
      processed through a modern analytics pipeline. From generation with
      statistically realistic distributions, through Kimball dimensional modelling
      and a measured star-vs-snowflake comparison, to an interactive cost
      forecaster calibrated from the warehouse itself.

      500K API requests across 5,000 users, 5 models and 5 endpoints over a 91-day
      window, modelled on real-world patterns from APIs like Anthropic's Claude.

      Everything self-hosted and open source. No managed warehouse, no third-party
      analytics, no vendor account needed to run it.


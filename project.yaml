  - slug: generation
    title: Data Generation
    published: true
    body: |
      The synthetic dataset is not random noise. Each column uses a
      domain-appropriate statistical distribution, because realistic data exposes
      real query-planner behaviour and index selectivity -- uniform random data
      makes every plan look alike.

      | Column | Distribution | Why |
      |---|---|---|
      | Latency | Log-normal, mu 6.5, sigma 0.8 | Clusters around a median with a heavy right tail from cold starts and large context windows |
      | Tokens | Pareto, alpha 1.5 | A small fraction of enterprise users send massive context windows |
      | Traffic | Sinusoidal via rejection sampling | Minus 85 percent overnight, minus 40 percent at weekends |
      | HTTP status | Weighted categorical | 200/429/500/401 at 94/3/2/1 percent |
      | Safety flags | Bernoulli, p 0.008 | A textbook Bernoulli trial |

      Seed 42 throughout, so the dataset is reproducible.

  - slug: models
    title: Data Models
    published: true
    body: |
      The same raw data is modelled twice, on purpose.

      **Star** -- one fact table with four conformed, denormalised dimensions.
      Industry lives directly on the user dimension.

      **Snowflake** -- the normalised counterpart, where users point at companies
      and billing tiers, reusing the star's conformed dimensions.

      Building both is what makes the trade-off measurable rather than theoretical.

    embeds:
      - kind: mermaid
        title: Star schema
        source: |
          erDiagram
              FCT_API_REQUESTS ||--o{ DIM_USERS : "user_key"
              FCT_API_REQUESTS ||--o{ DIM_MODELS : "model_key"
              FCT_API_REQUESTS ||--o{ DIM_DATE : "date_key"
              FCT_API_REQUESTS ||--o{ DIM_ENDPOINTS : "endpoint_key"
              FCT_API_REQUESTS {
                  varchar request_id PK
                  text user_key FK
                  text model_key FK
                  int date_key FK
                  text endpoint_key FK
                  numeric latency_ms
                  int tokens_input
                  int tokens_output
                  numeric cost_usd
                  smallint http_status
                  boolean safety_flag
              }
              DIM_USERS {
                  text user_key PK
                  varchar user_id
                  varchar billing_tier
                  varchar company_name
                  varchar industry
                  varchar region
              }
              DIM_MODELS {
                  text model_key PK
                  varchar model_id
                  varchar model_family
                  numeric cost_per_input_token
                  numeric cost_per_output_token
                  int context_window_k
              }
              DIM_ENDPOINTS {
                  text endpoint_key PK
                  varchar endpoint_path
                  varchar api_version
                  boolean is_deprecated
              }
              DIM_DATE {
                  int date_key PK
                  date full_date
                  varchar day_of_week
                  boolean is_weekend
                  smallint year
              }
      - kind: mermaid
        title: Snowflake schema -- the same facts, normalised
        source: |
          erDiagram
              FCT_API_REQUESTS_SF ||--o{ DIM_USERS_SF : "user_key"
              DIM_USERS_SF ||--o{ DIM_COMPANIES : "company_key"
              DIM_USERS_SF ||--o{ DIM_BILLING_TIERS : "billing_tier_key"
              FCT_API_REQUESTS_SF ||--o{ DIM_MODELS : "model_key (conformed)"
              FCT_API_REQUESTS_SF ||--o{ DIM_ENDPOINTS : "endpoint_key (conformed)"
              FCT_API_REQUESTS_SF ||--o{ DIM_DATE : "date_key (conformed)"
              DIM_USERS_SF {
                  text user_key PK
                  varchar user_id
                  text company_key FK
                  text billing_tier_key FK
                  date signup_date
                  varchar region
              }

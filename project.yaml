                  numeric monthly_price_usd
                  int rate_limit_rpm
                  boolean has_priority_access
              }

  - slug: performance
    title: Measuring the Star-vs-Snowflake Trade-off
    published: true
    body: |
      One business question -- total cost by industry -- asked against both
      schemas with EXPLAIN ANALYZE. The measurement ships as a script
      (`data/benchmark_star_vs_snowflake.py`), so the number is a command,
      not a claim. Medians of five warm runs, Postgres 16:

      | Query | Schema | Joins | Median |
      |---|---|---|---|
      | Cost by model | star | 1 | 51 ms |
      | Cost by industry | star | 1 | **53 ms** |
      | Cost by industry | snowflake | 3 | 56 ms |

      An earlier measurement of the same queries showed 51 ms vs 206 ms -- a 4x
      gap -- because that planner ran the snowflake's three hash joins without
      parallelism. On hardware where every plan parallelises, the gap narrows
      to a few percent at 500K rows.

      Two environments, two answers, one lesson, and it is the reason both
      schemas exist: the denormalisation trade-off is real but
      environment-dependent. Storage redundancy buys join elimination, and its
      value depends on the planner, the cache, and the scale in front of you.
      The snowflake earns its cost when dimensions are large, frequently
      updated, or when write-path consistency matters more than read
      performance. Here, none of those hold.

  - slug: forecaster
    title: Cost Forecaster
    published: true
    body: |
      Model the cost of an LLM workload before committing to it. Set a request
      volume, choose a mix of models, and the forecaster projects twelve months
      of spend against revenue and gross margin.

      Its defaults are not guesses. On startup it queries the star schema as
      the read-only role and calibrates from observed traffic: the real model
      mix, real token averages, and real request rates from 500K telemetry
      rows, surfaced as a TELEMETRY (OBSERVED) preset. When the database is
      absent it degrades to a clearly labeled parametric mode rather than
      fabricating numbers. Pricing comes from the same single-source catalog
      the generator and the warehouse use, so the sliders can never drift from
      the data.

  - slug: quality
    title: A Bug the Tests Caught
    published: true
    body: |
      The company dimension was built with `SELECT DISTINCT company_name, industry`.
      It returned 6,457 rows against roughly 4,900 real companies, because the
      generator had assigned multiple industries to the same company name.

      Those surplus rows fanned out the join and silently inflated the fact table
      from 500K to 640K rows -- a 28 percent error in every revenue figure
      downstream. Nothing looked broken. The pipeline ran green and the dashboards
      rendered.

      The `unique` test on the company key failed. The fix was `mode() WITHIN GROUP`,
      picking one industry per company deterministically.

      That is the argument for declarative data tests in a paragraph: without one,
      every number was wrong and every surface said it was fine.
